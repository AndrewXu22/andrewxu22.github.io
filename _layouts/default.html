<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
</head>
<body>
<div class="site-wrapper">

  <!-- Top bar -->
  <header class="site-header">
    <a href="{{ '/' | relative_url }}" class="site-title">
      Hailu <span>Xu</span>
    </a>
    <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.querySelector('.site-nav').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- Sidebar nav -->
  <nav class="site-nav">
    <ul>
      <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>
        <span class="nav-icon">🏠</span> Home</a></li>
      <li><a href="{{ '/research/' | relative_url }}"{% if page.url contains 'research' %} class="active"{% endif %}>
        <span class="nav-icon">🔬</span> Research</a></li>
      <li><a href="{{ '/publications/' | relative_url }}"{% if page.url contains 'publication' %} class="active"{% endif %}>
        <span class="nav-icon">📄</span> Publications</a></li>
      <li><a href="{{ '/experience/' | relative_url }}"{% if page.url contains 'experience' %} class="active"{% endif %}>
        <span class="nav-icon">💼</span> Experience</a></li>
      <li><a href="{{ '/teaching/' | relative_url }}"{% if page.url contains 'teaching' %} class="active"{% endif %}>
        <span class="nav-icon">🎓</span> Teaching</a></li>
      <li><a href="{{ '/group/' | relative_url }}"{% if page.url contains 'group' %} class="active"{% endif %}>
        <span class="nav-icon">👥</span> Group</a></li>
      <li><a href="{{ '/services/' | relative_url }}"{% if page.url contains 'service' %} class="active"{% endif %}>
        <span class="nav-icon">🏅</span> Services</a></li>
      <li><a href="{{ '/contact/' | relative_url }}"{% if page.url contains 'contact' %} class="active"{% endif %}>
        <span class="nav-icon">✉️</span> Contact</a></li>
    </ul>
  </nav>

  <!-- Main -->
  <main class="site-main">
    {{ content }}
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <p>© {{ 'now' | date: "%Y" }} Hailu Xu &nbsp;·&nbsp; California State University, Long Beach &nbsp;·&nbsp;
    <a href="mailto:hailu.xu@csulb.edu">hailu.xu@csulb.edu</a></p>
  </footer>

</div>

<script>
  // Close nav on outside click (mobile)
  document.addEventListener('click', function(e) {
    const nav = document.querySelector('.site-nav');
    const toggle = document.querySelector('.nav-toggle');
    if (nav.classList.contains('open') && !nav.contains(e.target) && !toggle.contains(e.target)) {
      nav.classList.remove('open');
    }
  });
</script>
</body>
</html>
